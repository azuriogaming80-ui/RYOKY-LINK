<!DOCTYPE html>
<html lang="fr" data-theme="sao">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RYOKY-LINK</title>
    
    <!-- Anti-FOUC : Applique le thème AVANT le rendu -->
    <script>
      const savedTheme = localStorage.getItem('ryoky-theme') || 'sao';
      document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    
    <!-- Import des polices pour tous les thèmes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Creepster&family=Mountains+of+Christmas:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
